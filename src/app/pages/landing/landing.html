<div class="page-wrapper">
  <h1 class="mat-headline-4">Vehicle Brand Explorer</h1>

  <form class="search-form">
    <mat-form-field>
      <mat-label>Search by</mat-label>
      <mat-select [formField]="searchForm.byName">
        <mat-option [value]="true">Name</mat-option>
        <mat-option [value]="false">Id</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field class="search-input">
      <mat-label>Brand by {{ searchForm.byName().value() ? 'Name' : 'Id' }}</mat-label>
      <input
        matInput
        [formField]="searchForm.query"
        [placeholder]="'Introduce the Brands\' ' + (searchForm.byName().value() ? 'name' : 'Id')"
      />
    </mat-form-field>
  </form>

  <app-table [items]="filteredMakes()" (clicked)="goTo($event.id)"></app-table>
</div>
